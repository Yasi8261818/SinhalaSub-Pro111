<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lakshan Movies - ලක්ෂාන් චිත්‍රපට</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+Sinhala:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c14;
            --surface: #0e1520;
            --card: #121a28;
            --border: #1e2d42;
            --gold: #f5c518;
            --gold-dim: #c9a114;
            --blue: #2196f3;
            --red: #e53935;
            --text: #e8eaf0;
            --muted: #6b7a90;
            --green: #00c853;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* NOISE TEXTURE OVERLAY */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        /* ===== HEADER ===== */
        header {
            background: linear-gradient(180deg, #050810 0%, rgba(8,12,20,0.95) 100%);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(12px);
        }

        .header-inner {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 20px;
            height: 64px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: var(--gold);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
            color: #000;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 0;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .logo-text span:first-child {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            color: var(--gold);
            letter-spacing: 2px;
        }

        .logo-text span:last-child {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
            margin-left: 10px;
        }

        .tab-btn {
            background: transparent;
            color: var(--muted);
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 1px;
            transition: all 0.2s;
            text-transform: uppercase;
            border: 1px solid transparent;
        }

        .tab-btn:hover { color: var(--text); background: var(--surface); }
        .tab-btn.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
        }

        .search-wrap {
            margin-left: auto;
            position: relative;
        }

        .search-input {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 36px 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Rajdhani', sans-serif;
            width: 220px;
            transition: border 0.2s;
            outline: none;
        }

        .search-input:focus { border-color: var(--gold); }
        .search-input::placeholder { color: var(--muted); }

        .search-icon {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 14px;
            pointer-events: none;
        }

        /* ===== HERO BANNER ===== */
        .hero-banner {
            position: relative;
            height: 300px;
            overflow: hidden;
            display: none;
        }

        .hero-banner.show { display: block; }

        .hero-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.35) blur(2px);
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(8,12,20,0.95) 30%, transparent 70%), linear-gradient(180deg, transparent 40%, var(--bg) 100%);
            display: flex;
            align-items: center;
            padding: 40px;
        }

        .hero-content { max-width: 500px; }
        .hero-badge { background: var(--red); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 4px; letter-spacing: 1px; display: inline-block; margin-bottom: 12px; }
        .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 2px; line-height: 1; margin-bottom: 8px; }
        .hero-meta { color: var(--muted); font-size: 14px; margin-bottom: 16px; }
        .hero-btn { background: var(--gold); color: #000; border: none; padding: 10px 24px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 15px; font-family: 'Rajdhani', sans-serif; letter-spacing: 1px; text-transform: uppercase; transition: 0.2s; }
        .hero-btn:hover { background: var(--gold-dim); }

        /* ===== MAIN CONTENT ===== */
        .container { padding: 30px 20px 80px; max-width: 1300px; margin: 0 auto; position: relative; z-index: 1; }

        .section-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 2px;
            color: var(--text);
        }

        .section-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        .section-count {
            font-size: 12px;
            color: var(--muted);
            background: var(--surface);
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        /* ===== MOVIE GRID ===== */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 18px;
        }

        .movie-card {
            background: var(--card);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s;
            position: relative;
            border: 1px solid var(--border);
        }

        .movie-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 16px 40px rgba(0,0,0,0.6), 0 0 0 1px var(--gold);
        }

        .movie-card:hover .card-overlay { opacity: 1; }

        .card-img-wrap { position: relative; }

        .movie-card img {
            width: 100%;
            height: 230px;
            object-fit: cover;
            display: block;
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-icon {
            width: 52px;
            height: 52px;
            background: rgba(245,197,24,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .card-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--red);
            color: #fff;
            padding: 2px 7px;
            font-size: 10px;
            font-weight: 700;
            border-radius: 4px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .card-badge.tv { background: var(--blue); }
        .card-badge.quality { background: rgba(0,0,0,0.7); border: 1px solid var(--gold); color: var(--gold); right: 8px; left: auto; }

        .rating-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.8);
            color: var(--gold);
            padding: 2px 7px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .card-info { padding: 10px 12px 12px; }

        .movie-title {
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .movie-year { font-size: 11px; color: var(--muted); }

        /* ===== SKELETON LOADER ===== */
        .skeleton {
            background: linear-gradient(90deg, var(--card) 25%, var(--surface) 50%, var(--card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 10px;
            height: 280px;
            border: 1px solid var(--border);
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            padding: 15px;
            backdrop-filter: blur(8px);
        }

        .modal.show { display: flex; }

        .modal-content {
            background: var(--surface);
            max-width: 500px;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
            animation: modalIn 0.25s ease;
        }

        @keyframes modalIn {
            from { transform: scale(0.9) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .modal-hero {
            position: relative;
            height: 180px;
            overflow: hidden;
        }

        .modal-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.4) blur(4px);
        }

        .modal-poster {
            position: absolute;
            bottom: -30px;
            left: 24px;
            width: 90px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            border: 2px solid var(--border);
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .modal-close:hover { background: var(--red); }

        .modal-body { padding: 40px 24px 24px 130px; }
        .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1.5px; margin-bottom: 4px; }
        .modal-meta { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
        .modal-meta span { color: var(--gold); }

        .tv-controls {
            display: none;
            gap: 12px;
            margin-bottom: 16px;
            padding: 14px;
            background: var(--card);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .tv-controls.show { display: flex; }

        .control-group { flex: 1; }

        .control-group label {
            display: block;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-group input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 15px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            text-align: center;
            outline: none;
            transition: border 0.2s;
        }

        .control-group input:focus { border-color: var(--gold); }

        .dl-section { display: flex; flex-direction: column; gap: 10px; }

        .btn-dl {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 13px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--gold);
            color: #000;
            box-shadow: 0 4px 20px rgba(245,197,24,0.25);
        }

        .btn-primary:hover { background: var(--gold-dim); transform: translateY(-1px); box-shadow: 0 8px 28px rgba(245,197,24,0.35); }

        .btn-secondary {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover { border-color: var(--gold); color: var(--gold); background: rgba(245,197,24,0.05); }

        .notice {
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            padding: 8px;
            background: var(--card);
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        /* Server selector */
        .server-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .server-tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .srv-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            transition: all 0.2s;
        }

        .srv-btn:hover { border-color: var(--gold); color: var(--gold); }
        .srv-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 5000;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ===== FOOTER ===== */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
            z-index: 900;
        }

        .footer span { color: var(--gold); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .search-wrap { display: none; }
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
            .movie-card img { height: 195px; }
            .modal-body { padding: 40px 16px 20px 110px; }
            .hero-banner { height: 220px; }
            .hero-title { font-size: 34px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <a href="#" class="logo" onclick="loadData('movie'); return false;">
            <div class="logo-icon">L</div>
            <div class="logo-text">
                <span>Lakshan Movies</span>
                <span>සිංහල සබ් • HD</span>
            </div>
        </a>
        <div class="nav-tabs">
            <button id="tab-movie" class="tab-btn active" onclick="loadData('movie')">🎬 Movies</button>
            <button id="tab-tv" class="tab-btn" onclick="loadData('tv')">📺 TV Series</button>
        </div>
        <div class="search-wrap">
            <input type="text" class="search-input" id="search-input" placeholder="සොයන්න... (Search)" oninput="searchMovies(this.value)">
            <span class="search-icon">🔍</span>
        </div>
    </div>
</header>

<!-- Hero Banner -->
<div class="hero-banner" id="hero-banner">
    <img id="hero-bg" src="" alt="" class="hero-bg">
    <div class="hero-overlay">
        <div class="hero-content">
            <span class="hero-badge">🔥 TRENDING #1</span>
            <div class="hero-title" id="hero-title"></div>
            <div class="hero-meta" id="hero-meta"></div>
            <button class="hero-btn" id="hero-download-btn">📥 DOWNLOAD NOW</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="section-header">
        <h2 class="section-title" id="section-title">TRENDING MOVIES</h2>
        <div class="section-line"></div>
        <div class="section-count" id="result-count">Loading...</div>
    </div>
    <div class="movie-grid" id="main-grid"></div>
</div>

<!-- Modal -->
<div class="modal" id="dl-modal">
    <div class="modal-content">
        <div class="modal-hero">
            <img id="modal-bg" src="" alt="" class="modal-bg">
            <img id="modal-poster" src="" alt="" class="modal-poster">
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
            <div class="modal-title" id="modal-title">-</div>
            <div class="modal-meta" id="modal-meta">-</div>

            <div class="tv-controls" id="tv-controls">
                <div class="control-group">
                    <label>Season (සීසන්)</label>
                    <input type="number" id="season-input" value="1" min="1" max="30" onchange="updateLinks()">
                </div>
                <div class="control-group">
                    <label>Episode (එපිසෝඩ්)</label>
                    <input type="number" id="episode-input" value="1" min="1" max="200" onchange="updateLinks()">
                </div>
            </div>

            <div class="dl-section">
                <div class="server-label">🖥 Watch Server තෝරන්න</div>
                <div class="server-tabs" id="stream-servers">
                    <button class="srv-btn active" onclick="setStreamServer(0)">Server 1</button>
                    <button class="srv-btn" onclick="setStreamServer(1)">Server 2</button>
                    <button class="srv-btn" onclick="setStreamServer(2)">Server 3</button>
                </div>
                <a href="#" id="btn-stream" target="_blank" class="btn-dl btn-primary">▶ Online බලන්න (Watch)</a>

                <div class="server-label" style="margin-top:10px;">📥 Download Sites</div>
                <div id="dl-links-wrap"></div>

                <p class="notice">⚠️ Site එකකට ගිහින් movie name search කරන්න • Ad Blocker නිර්දේශිතයි</p>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<footer class="footer">
    © 2025 <span>Lakshan Movies</span> — සිංහල සබ් සහිතව Movies & TV Series | HD Quality
</footer>

<script>
    const API_KEY = 'b3e4dcdee44f099232eb375b6a4e6990';
    const IMG = 'https://image.tmdb.org/t/p/w500';
    const IMG_ORIG = 'https://image.tmdb.org/t/p/original';

    let currentType = 'movie';
    let currentItem = null;
    let allItems = [];
    let searchTimeout = null;
    let activeStreamServer = 0;

    // ===== STREAM SERVERS =====
    function getStreamUrl(id, type, s, e) {
        const servers = {
            movie: [
                `https://vidsrc.xyz/embed/movie?tmdb=${id}`,
                `https://multiembed.mov/?video_id=${id}&tmdb=1`,
                `https://player.smashy.stream/movie/${id}`
            ],
            tv: [
                `https://vidsrc.xyz/embed/tv?tmdb=${id}&season=${s}&episode=${e}`,
                `https://multiembed.mov/?video_id=${id}&tmdb=1&s=${s}&e=${e}`,
                `https://player.smashy.stream/tv/${id}?s=${s}&e=${e}`
            ]
        };
        return servers[type][activeStreamServer] || servers[type][0];
    }

    function setStreamServer(idx) {
        activeStreamServer = idx;
        document.querySelectorAll('#stream-servers .srv-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
        updateLinks();
    }

    // ===== BUILD DOWNLOAD SITE LINKS =====
    function buildDlLinks(title, year, type) {
        const q = encodeURIComponent(title + ' ' + year);
        const qt = encodeURIComponent(title);
        const sites = type === 'tv'
            ? [
                { icon:'🔥', name:'1337x — TV Series', url:`https://1337x.to/search/${q}+season/1/` },
                { icon:'📺', name:'EZTV — TV Episodes',  url:`https://eztv.re/search/${qt}` },
                { icon:'🌐', name:'Torrent Galaxy — TV', url:`https://torrentgalaxy.to/torrents.php?search=${qt}` },
                { icon:'🎬', name:'YTS — Movies & More', url:`https://yts.mx/browse-movies/${qt}` },
              ]
            : [
                { icon:'🥇', name:'YTS — HD / 4K Blu-ray', url:`https://yts.mx/browse-movies/${qt}/all/all/0/seeds/0/all` },
                { icon:'🔥', name:'1337x — ඕනෑ Quality', url:`https://1337x.to/search/${q}/1/` },
                { icon:'🌐', name:'Torrent Galaxy',        url:`https://torrentgalaxy.to/torrents.php?search=${qt}` },
                { icon:'🔎', name:'Nyaa (Anime / Sub)',    url:`https://nyaa.si/?q=${qt}` },
              ];

        const wrap = document.getElementById('dl-links-wrap');
        wrap.innerHTML = '';
        sites.forEach(s => {
            const a = document.createElement('a');
            a.href = s.url;
            a.target = '_blank';
            a.className = 'btn-dl btn-secondary';
            a.style.marginBottom = '8px';
            a.innerHTML = `${s.icon} ${s.name}`;
            wrap.appendChild(a);
        });
    }

    // ===== LOAD DATA =====
    function loadData(type) {
        currentType = type;
        document.getElementById('tab-movie').classList.toggle('active', type === 'movie');
        document.getElementById('tab-tv').classList.toggle('active', type === 'tv');
        document.getElementById('section-title').innerText = type === 'movie' ? 'TRENDING MOVIES' : 'POPULAR TV SERIES';
        document.getElementById('search-input').value = '';
        showSkeletons();

        fetch(`https://api.themoviedb.org/3/trending/${type}/week?api_key=${API_KEY}&language=en-US`)
            .then(res => {
                if (!res.ok) throw new Error('Network error');
                return res.json();
            })
            .then(data => {
                allItems = data.results.filter(i => i.poster_path);
                renderGrid(allItems);
                showHero(allItems[0]);
            })
            .catch(err => {
                console.error(err);
                document.getElementById('main-grid').innerHTML = `
                    <div style="grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted);">
                        <div style="font-size:40px;margin-bottom:12px;">😕</div>
                        <div style="font-size:16px;">Data load failed. Please check your connection.</div>
                        <button onclick="loadData('${type}')" style="margin-top:16px;background:var(--gold);color:#000;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-weight:700;">Retry</button>
                    </div>`;
                document.getElementById('result-count').innerText = 'Error';
                document.getElementById('hero-banner').classList.remove('show');
            });
    }

    // ===== HERO =====
    function showHero(item) {
        if (!item || !item.backdrop_path) {
            document.getElementById('hero-banner').classList.remove('show');
            return;
        }
        document.getElementById('hero-bg').src = IMG_ORIG + item.backdrop_path;
        document.getElementById('hero-title').innerText = item.title || item.name;
        document.getElementById('hero-meta').innerText = `⭐ ${item.vote_average?.toFixed(1) || 'N/A'} • ${(item.release_date || item.first_air_date || '').slice(0,4)}`;
        document.getElementById('hero-download-btn').onclick = () => openModal(item);
        document.getElementById('hero-banner').classList.add('show');
    }

    // ===== RENDER GRID =====
    function renderGrid(items) {
        const grid = document.getElementById('main-grid');
        document.getElementById('result-count').innerText = `${items.length} results`;

        if (items.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted);">No results found.</div>`;
            return;
        }

        grid.innerHTML = '';
        items.forEach(item => {
            const title = item.title || item.name;
            const year = (item.release_date || item.first_air_date || '').slice(0, 4);
            const rating = item.vote_average ? item.vote_average.toFixed(1) : '';
            const type = item.media_type === 'tv' || currentType === 'tv' ? 'tv' : 'movie';

            const card = document.createElement('div');
            card.className = 'movie-card';
            card.onclick = () => openModal(item);
            card.innerHTML = `
                <div class="card-img-wrap">
                    <img src="${IMG}${item.poster_path}" alt="${title}" loading="lazy">
                    <div class="card-overlay"><div class="play-icon">▶</div></div>
                    <span class="card-badge ${type}">${type === 'tv' ? 'TV' : 'MOVIE'}</span>
                    <span class="card-badge quality">HD</span>
                    ${rating ? `<span class="rating-badge">⭐ ${rating}</span>` : ''}
                </div>
                <div class="card-info">
                    <div class="movie-title">${title}</div>
                    <div class="movie-year">${year}</div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // ===== SKELETONS =====
    function showSkeletons() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = Array(16).fill('<div class="skeleton"></div>').join('');
        document.getElementById('result-count').innerText = 'Loading...';
        document.getElementById('hero-banner').classList.remove('show');
    }

    // ===== SEARCH =====
    function searchMovies(query) {
        clearTimeout(searchTimeout);
        if (!query.trim()) { renderGrid(allItems); showHero(allItems[0]); return; }
        document.getElementById('hero-banner').classList.remove('show');

        searchTimeout = setTimeout(() => {
            document.getElementById('result-count').innerText = 'Searching...';
            fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=en-US`)
                .then(res => res.json())
                .then(data => {
                    const results = data.results.filter(i => i.poster_path && (i.media_type === 'movie' || i.media_type === 'tv'));
                    renderGrid(results);
                })
                .catch(() => showToast('Search failed. Try again.'));
        }, 400);
    }

    // ===== OPEN MODAL =====
    function openModal(item) {
        currentItem = item;
        activeStreamServer = 0;
        document.querySelectorAll('#stream-servers .srv-btn').forEach((b,i) => b.classList.toggle('active', i===0));

        const title = item.title || item.name;
        const year = (item.release_date || item.first_air_date || '').slice(0, 4);
        const rating = item.vote_average ? item.vote_average.toFixed(1) : 'N/A';
        const type = item.media_type === 'tv' || currentType === 'tv' ? 'tv' : 'movie';

        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-meta').innerHTML = `<span>⭐ ${rating}</span> • ${year} • ${type.toUpperCase()}`;
        document.getElementById('modal-poster').src = IMG + item.poster_path;
        document.getElementById('modal-bg').src = item.backdrop_path ? IMG + item.backdrop_path : IMG + item.poster_path;

        const tvControls = document.getElementById('tv-controls');
        if (type === 'tv') {
            tvControls.classList.add('show');
            document.getElementById('season-input').value = 1;
            document.getElementById('episode-input').value = 1;
        } else {
            tvControls.classList.remove('show');
        }

        buildDlLinks(title, year, type);
        updateLinks();
        document.getElementById('dl-modal').classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    // ===== UPDATE STREAM LINK =====
    function updateLinks() {
        if (!currentItem) return;
        const type = currentItem.media_type === 'tv' || currentType === 'tv' ? 'tv' : 'movie';
        const s = document.getElementById('season-input').value || 1;
        const e = document.getElementById('episode-input').value || 1;
        document.getElementById('btn-stream').href = getStreamUrl(currentItem.id, type, s, e);
    }

    // ===== CLOSE MODAL =====
    function closeModal() {
        document.getElementById('dl-modal').classList.remove('show');
        document.body.style.overflow = '';
    }

    document.getElementById('dl-modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ===== TOAST =====
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ===== INIT =====
    loadData('movie');
</script>
</body>
</html>
