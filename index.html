<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lakshan - ෆිල්ම් & TV Series - සිංහල</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6b35;
            --primary-dark: #cc5528;
            --secondary: #f7931e;
            --accent: #00d4ff;
            --success: #22dd88;
            --danger: #ff3333;
            --dark: #0a0e1a;
            --darker: #050609;
            --surface: #13192d;
            --card: #1a2342;
            --border: #2a3a5e;
            --text: #e8eef7;
            --text-dim: #8a96b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: var(--dark);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
        }

        /* ===== HEADER ===== */
        header {
            background: linear-gradient(180deg, rgba(10,14,26,0.99) 0%, rgba(13,19,31,0.98) 100%);
            border-bottom: 3px solid var(--primary);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .header {
            max-width: 1500px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #fff;
            font-size: 26px;
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.35);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .logo-text h1 {
            font-family: 'Bebas Neue';
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .logo-text p {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .search-bar {
            flex: 1;
            max-width: 450px;
            position: relative;
        }

        .search-input {
            width: 100%;
            background: var(--card);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.2);
        }

        .search-input::placeholder {
            color: var(--text-dim);
        }

        .nav-menu {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-btn:hover, .nav-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* ===== MAIN ===== */
        .container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 40px 20px 100px;
        }

        .hero {
            text-align: center;
            margin-bottom: 50px;
        }

        .hero h1 {
            font-family: 'Bebas Neue';
            font-size: 52px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--text), var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            color: var(--text-dim);
            font-size: 16px;
            margin-bottom: 30px;
        }

        .search-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: #fff;
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(255, 107, 53, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* ===== GRID ===== */
        .section-title {
            font-family: 'Bebas Neue';
            font-size: 32px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: var(--text);
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 24px;
            margin-bottom: 60px;
        }

        .movie-card {
            background: var(--card);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            group: hover;
        }

        .movie-card:hover {
            transform: translateY(-12px) scale(1.05);
            border-color: var(--primary);
            box-shadow: 0 20px 60px rgba(255, 107, 53, 0.25);
        }

        .movie-poster {
            width: 100%;
            height: 260px;
            object-fit: cover;
            background: var(--surface);
            display: block;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .movie-card:hover .overlay {
            opacity: 1;
        }

        .play-icon {
            width: 70px;
            height: 70px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #fff;
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.4);
        }

        .card-label {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.8);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            border: 1px solid var(--primary);
        }

        .card-info {
            padding: 14px;
        }

        .card-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-size: 12px;
            color: var(--text-dim);
            display: flex;
            gap: 8px;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .modal.show {
            display: flex;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-hero {
            position: relative;
            height: 280px;
            overflow: hidden;
        }

        .modal-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.5) blur(4px);
        }

        .modal-poster {
            position: absolute;
            bottom: -50px;
            left: 30px;
            width: 120px;
            border-radius: 12px;
            border: 4px solid var(--border);
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.8);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10;
        }

        .modal-close:hover {
            background: var(--danger);
        }

        .modal-content {
            padding: 70px 30px 40px;
        }

        .modal-title {
            font-family: 'Bebas Neue';
            font-size: 38px;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .modal-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            font-size: 14px;
            flex-wrap: wrap;
        }

        .meta-item {
            color: var(--text-dim);
        }

        .meta-item span {
            color: var(--primary);
            font-weight: 700;
        }

        .modal-desc {
            color: var(--text-dim);
            margin-bottom: 25px;
            line-height: 1.7;
            font-size: 14px;
        }

        .action-section {
            margin-bottom: 25px;
        }

        .action-label {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .btn-action {
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 13px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-watch {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: #fff;
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.3);
        }

        .btn-watch:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(255, 107, 53, 0.4);
        }

        .btn-download {
            background: var(--card);
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-download:hover {
            background: rgba(255, 107, 53, 0.1);
            border-color: var(--primary);
        }

        .sources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-top: 12px;
        }

        .source-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .source-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(255, 107, 53, 0.05);
        }

        .tv-inputs {
            display: none;
            gap: 12px;
            margin-bottom: 25px;
            padding: 16px;
            background: var(--card);
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .tv-inputs.show {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .input-group input {
            width: 100%;
            background: var(--dark);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            outline: none;
            transition: border 0.2s;
        }

        .input-group input:focus {
            border-color: var(--primary);
        }

        .warning {
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid var(--danger);
            color: var(--text);
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.6;
        }

        /* ===== LOADING ===== */
        .loader {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .loader.show {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            color: var(--text);
            font-weight: 600;
        }

        /* ===== SKELETON ===== */
        .skeleton {
            background: linear-gradient(90deg, var(--card) 25%, var(--surface) 50%, var(--card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 14px;
            height: 340px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header { flex-wrap: wrap; gap: 12px; }
            .search-bar { max-width: 100%; order: 3; width: 100%; }
            .logo-text h1 { font-size: 22px; }
            .hero h1 { font-size: 32px; }
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 14px; }
            .movie-poster { height: 200px; }
            .modal-box { max-width: 95%; }
            .action-buttons { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="header">
        <a href="#" class="logo" onclick="location.reload(); return false;">
            <div class="logo-icon">🎬</div>
            <div class="logo-text">
                <h1>Lakshan</h1>
                <p>HD • සිංහල • Free</p>
            </div>
        </a>
        <div class="search-bar">
            <input type="text" class="search-input" id="search-input" placeholder="Movie හෝ Series සොයන්න..." onkeypress="if(event.key==='Enter') searchMovies()">
        </div>
        <div class="nav-menu">
            <button class="nav-btn active" onclick="filterByType('movie')">🎬 Movies</button>
            <button class="nav-btn" onclick="filterByType('tv')">📺 TV</button>
        </div>
    </div>
</header>

<div class="container">
    <div class="hero">
        <h1>UNLIMITED MOVIES & TV</h1>
        <p>ඔයාගේ ඕනෑ ෆිල්ම් හෝ සිරිස් එක watch කරන්න හෝ download කරන්න</p>
    </div>

    <div class="search-controls">
        <button class="btn btn-primary" onclick="searchMovies()">🔍 SEARCH</button>
        <button class="btn btn-primary" onclick="loadTrendingMovies()">🔥 TRENDING</button>
    </div>

    <h2 class="section-title" id="section-title">🔥 TRENDING NOW</h2>
    <div class="movie-grid" id="movie-grid"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="if(event.target.id==='modal') closeModal()">
    <div class="modal-box">
        <div class="modal-hero">
            <img id="modal-hero-img" src="" alt="">
            <img id="modal-poster-img" src="" alt="" class="modal-poster">
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-content">
            <h2 class="modal-title" id="modal-title">-</h2>
            <div class="modal-meta" id="modal-meta"></div>
            <p class="modal-desc" id="modal-desc"></p>

            <div class="tv-inputs" id="tv-inputs">
                <div class="input-group">
                    <label>Season</label>
                    <input type="number" id="season-input" value="1" min="1" onchange="updateStreams()">
                </div>
                <div class="input-group">
                    <label>Episode</label>
                    <input type="number" id="episode-input" value="1" min="1" onchange="updateStreams()">
                </div>
            </div>

            <div class="action-section">
                <div class="action-label">▶ Watch Online</div>
                <div class="action-buttons">
                    <button class="btn-action btn-watch" onclick="watchOnline(0)">▶ Server 1</button>
                    <button class="btn-action btn-watch" onclick="watchOnline(1)">▶ Server 2</button>
                </div>
                <div class="sources-grid" id="stream-sources"></div>
            </div>

            <div class="action-section">
                <div class="action-label">📥 Download</div>
                <div class="action-buttons">
                    <button class="btn-action btn-download" onclick="downloadTorrent(0)">📥 YTS/1337x</button>
                    <button class="btn-action btn-download" onclick="downloadTorrent(1)">📥 Torrent Galaxy</button>
                </div>
                <div class="sources-grid" id="download-sources"></div>
            </div>

            <div class="warning">
                ⚠️ Note: VPN ඒක use කරලා ඉන්න ගිහින් safe. Ad Blocker දාගෙන තිබුණ නිවැරදි.
            </div>
        </div>
    </div>
</div>

<!-- LOADER -->
<div class="loader" id="loader">
    <div class="spinner"></div>
    <div class="loader-text" id="loader-text">Loading...</div>
</div>

<script>
    const API_KEY = 'b3e4dcdee44f099232eb375b6a4e6990';
    const IMG = 'https://image.tmdb.org/t/p/w500';
    const IMG_ORIG = 'https://image.tmdb.org/t/p/original';

    let currentType = 'movie';
    let currentItem = null;
    let allItems = [];

    // Stream sources
    const streamLinks = {
        movie: [
            id => `https://vidsrc.xyz/embed/movie?tmdb=${id}`,
            id => `https://multiembed.mov/?video_id=${id}&tmdb=1`,
            id => `https://2embed.cc/embed/${id}`,
            id => `https://www.4embed.org/embed/movie/${id}`
        ],
        tv: [
            (id, s, e) => `https://vidsrc.xyz/embed/tv?tmdb=${id}&season=${s}&episode=${e}`,
            (id, s, e) => `https://multiembed.mov/?video_id=${id}&tmdb=1&s=${s}&e=${e}`,
            (id, s, e) => `https://2embed.cc/embedtv/${id}/${s}/${e}`,
            (id, s, e) => `https://www.4embed.org/embed/tv/${id}/${s}/${e}`
        ]
    };

    // Download sources
    const downloadSites = {
        movie: [
            t => `https://yts.mx/browse-movies/${encodeURIComponent(t)}/all/all/0/seeds/0/all`,
            t => `https://1337x.to/search/${encodeURIComponent(t)}/1/`,
            t => `https://torrentgalaxy.to/torrents.php?search=${encodeURIComponent(t)}`,
            t => `https://rarbg.to/torrents.php?search=${encodeURIComponent(t)}`
        ],
        tv: [
            t => `https://eztv.re/search/${encodeURIComponent(t)}`,
            t => `https://1337x.to/search/${encodeURIComponent(t)}/1/`,
            t => `https://torrentgalaxy.to/torrents.php?search=${encodeURIComponent(t)}`,
            t => `https://rarbg.to/torrents.php?search=${encodeURIComponent(t)}`
        ]
    };

    // Load trending
    async function loadTrendingMovies() {
        showLoader('Loading trending movies...');
        try {
            const res = await fetch(`https://api.themoviedb.org/3/trending/${currentType}/week?api_key=${API_KEY}&language=en-US`);
            const data = await res.json();
            allItems = data.results.filter(m => m.poster_path);
            renderMovies(allItems);
            document.getElementById('section-title').innerText = currentType === 'movie' ? '🔥 TRENDING MOVIES' : '🔥 TRENDING TV SERIES';
        } catch (e) {
            alert('Network error. Please try again.');
        }
        showLoader(false);
    }

    // Search
    async function searchMovies() {
        const query = document.getElementById('search-input').value.trim();
        if (!query) return alert('Movie name type කරන්න!');

        showLoader('Searching...');
        try {
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=en-US`);
            const data = await res.json();
            allItems = (data.results || []).filter(m => m.poster_path && (m.media_type === 'movie' || m.media_type === 'tv'));
            
            if (allItems.length === 0) {
                alert('No results found.');
                return;
            }

            renderMovies(allItems);
            document.getElementById('section-title').innerText = `🔍 Search Results: "${query}"`;
        } catch (e) {
            alert('Search failed.');
        }
        showLoader(false);
    }

    // Render
    function renderMovies(movies) {
        const grid = document.getElementById('movie-grid');
        grid.innerHTML = '';

        movies.forEach(m => {
            const title = m.title || m.name;
            const year = (m.release_date || m.first_air_date || '').slice(0, 4);
            const type = m.media_type === 'tv' ? 'tv' : 'movie';

            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
                <img src="${IMG}${m.poster_path}" alt="${title}" class="movie-poster">
                <div class="overlay">
                    <div class="play-icon">▶</div>
                </div>
                <div class="card-label">${type.toUpperCase()}</div>
                <div class="card-info">
                    <div class="card-title">${title}</div>
                    <div class="card-meta">
                        <span>⭐ ${m.vote_average?.toFixed(1) || 'N/A'}</span>
                        <span>${year}</span>
                    </div>
                </div>
            `;

            card.onclick = () => openModal(m);
            grid.appendChild(card);
        });
    }

    // Open modal
    function openModal(item) {
        currentItem = item;
        const title = item.title || item.name;
        const year = (item.release_date || item.first_air_date || '').slice(0, 4);
        const type = item.media_type === 'tv' ? 'tv' : 'movie';
        const rating = item.vote_average?.toFixed(1) || 'N/A';

        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-meta').innerHTML = `
            <div class="meta-item"><span>⭐ ${rating}</span></div>
            <div class="meta-item"><span>${year}</span></div>
            <div class="meta-item"><span>${type.toUpperCase()}</span></div>
        `;
        document.getElementById('modal-desc').innerText = item.overview || 'No description available.';
        document.getElementById('modal-poster-img').src = IMG + item.poster_path;
        document.getElementById('modal-hero-img').src = item.backdrop_path ? IMG_ORIG + item.backdrop_path : IMG + item.poster_path;

        const tvInputs = document.getElementById('tv-inputs');
        if (type === 'tv') {
            tvInputs.classList.add('show');
        } else {
            tvInputs.classList.remove('show');
        }

        updateStreams();
        document.getElementById('modal').classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    // Update streams
    function updateStreams() {
        const type = currentItem.media_type === 'tv' ? 'tv' : 'movie';
        const season = document.getElementById('season-input').value || 1;
        const episode = document.getElementById('episode-input').value || 1;

        // Stream sources
        const streamGrid = document.getElementById('stream-sources');
        streamGrid.innerHTML = '';
        const links = streamLinks[type];
        links.forEach((fn, i) => {
            const url = type === 'tv' ? fn(currentItem.id, season, episode) : fn(currentItem.id);
            const btn = document.createElement('a');
            btn.href = url;
            btn.target = '_blank';
            btn.className = 'source-btn';
            btn.textContent = `🌐 Server ${i + 1}`;
            streamGrid.appendChild(btn);
        });

        // Download sources
        const dlGrid = document.getElementById('download-sources');
        dlGrid.innerHTML = '';
        const dlSites = downloadSites[type];
        const title = currentItem.title || currentItem.name;
        dlSites.forEach((fn, i) => {
            const btn = document.createElement('a');
            btn.href = fn(title);
            btn.target = '_blank';
            btn.className = 'source-btn';
            btn.textContent = i === 0 ? '🥇 YTS' : i === 1 ? '🔥 1337x' : i === 2 ? '🌐 Galaxy' : '⚡ RARBG';
            dlGrid.appendChild(btn);
        });
    }

    // Watch online
    function watchOnline(idx) {
        const type = currentItem.media_type === 'tv' ? 'tv' : 'movie';
        const season = document.getElementById('season-input').value || 1;
        const episode = document.getElementById('episode-input').value || 1;
        const url = type === 'tv' 
            ? streamLinks.tv[idx](currentItem.id, season, episode)
            : streamLinks.movie[idx](currentItem.id);
        window.open(url, '_blank');
    }

    // Download
    function downloadTorrent(idx) {
        const type = currentItem.media_type === 'tv' ? 'tv' : 'movie';
        const title = currentItem.title || currentItem.name;
        const url = downloadSites[type][idx](title);
        window.open(url, '_blank');
    }

    // Filter
    function filterByType(type) {
        currentType = type;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        loadTrendingMovies();
    }

    // Loader
    function showLoader(text) {
        const loader = document.getElementById('loader');
        if (text) {
            document.getElementById('loader-text').innerText = text;
            loader.classList.add('show');
        } else {
            loader.classList.remove('show');
        }
    }

    // Close modal
    function closeModal() {
        document.getElementById('modal').classList.remove('show');
        document.body.style.overflow = '';
    }

    // Init
    loadTrendingMovies();
</script>

</body>
</html>
